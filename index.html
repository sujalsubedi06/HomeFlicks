<!DOCTYPE html>
<html lang="en">
<head>
    <!-- ============================================= -->
    <!-- BASIC META                                     -->
    <!-- ============================================= -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>HomeFlicks • Premium Player</title>

    <meta name="description" content="Minimal premium movie player">
    <meta name="theme-color" content="#090909">
    <meta name="color-scheme" content="dark">
    <meta name="robots" content="noindex">

    <link rel="icon" href="favicon.ico">

    <!-- ============================================= -->
    <!-- GOOGLE FONT                                   -->
    <!-- ============================================= -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap"
        rel="stylesheet">

    <!-- ============================================= -->
    <!-- STYLESHEET                                    -->
    <!-- ============================================= -->
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <!-- ============================================= -->
    <!-- NAVBAR                                        -->
    <!-- ============================================= -->

    <header class="navbar" id="navbar">

        <div class="navbar__inner">

            <a href="#top"
               class="navbar__logo"
               aria-label="HomeFlicks Home">

                <span class="navbar__logo-primary">Home</span><span class="navbar__logo-accent">Flicks</span>

            </a>

            <a
                class="navbar__github"
                id="githubLink"
                target="_blank"
                rel="noopener noreferrer"
                aria-label="GitHub Repository">

                <svg
                    class="navbar__github-icon"
                    viewBox="0 0 24 24"
                    fill="currentColor"
                    aria-hidden="true">

                    <path d="M12 .5C5.73.5.75 5.48.75 11.75c0 5.02 3.26 9.27 7.77 10.77.57.1.78-.25.78-.55
                    0-.27-.01-1.16-.02-2.11-3.16.69-3.83-1.34-3.83-1.34-.52-1.31-1.26-1.66-1.26-1.66
                    -1.03-.7.08-.69.08-.69 1.14.08 1.74 1.17 1.74 1.17 1.01 1.73 2.65 1.23 3.3.94
                    .1-.73.4-1.23.72-1.51-2.52-.29-5.17-1.26-5.17-5.6 0-1.24.44-2.25 1.17-3.04
                    -.12-.29-.51-1.45.11-3.02 0 0 .96-.31 3.14 1.16a10.9 10.9 0 0 1 2.86-.38c.97 0
                    1.95.13 2.86.38 2.18-1.47 3.14-1.16 3.14-1.16.62 1.57.23 2.73.11 3.02.73.79
                    1.17 1.8 1.17 3.04 0 4.35-2.65 5.31-5.18 5.59.41.35.77 1.04.77 2.11 0 1.53-.01
                    2.75-.01 3.12 0 .3.2.66.79.55A11.26 11.26 0 0 0 23.25 11.75C23.25 5.48 18.27.5 12 .5Z"/>

                </svg>

                <span>GitHub</span>

            </a>

        </div>

    </header>

    <!-- ============================================= -->
    <!-- MAIN                                          -->
    <!-- ============================================= -->

    <main id="top">

        <!-- ========================================= -->
        <!-- HERO PLAYER                              -->
        <!-- ========================================= -->

        <section
            class="hero"
            aria-labelledby="playerHeading">

            <div
                class="hero__glow"
                aria-hidden="true">
            </div>

            <h1
                id="playerHeading"
                class="sr-only">

                Movie Player

            </h1>

            <div class="hero__player-wrapper">

                <div
                    id="player"
                    class="hero__player"
                    role="region"
                    aria-label="Embedded Movie Player">

                    <!-- Loading Placeholder -->

                    <div class="player-loading">

                        <div class="loader"></div>

                        <p>Loading player...</p>

                    </div>

                </div>

            </div>

        </section>

        <!-- ========================================= -->
        <!-- ACTION BUTTONS                            -->
        <!-- ========================================= -->

        <section
            class="actions-section"
            aria-label="Player Controls">

            <div class="actions">

                <!-- Fullscreen -->

                <button
                    id="fullscreenBtn"
                    class="btn btn--primary"
                    type="button">

                    <svg
                        class="btn__icon"
                        viewBox="0 0 24 24"
                        fill="none"
                        aria-hidden="true">

                        <path
                            d="M9 3H5a2 2 0 0 0-2 2v4M15 3h4a2 2 0 0 1 2 2v4M9 21H5a2 2 0 0 1-2-2v-4M15 21h4a2 2 0 0 0 2-2v-4"
                            stroke="currentColor"
                            stroke-width="1.8"
                            stroke-linecap="round"
                            stroke-linejoin="round"/>

                    </svg>

                    <span>

                        Watch Fullscreen

                    </span>

                </button>

                <!-- Reload -->

                <button
                    id="reloadBtn"
                    class="btn btn--secondary"
                    type="button">

                    <svg
                        class="btn__icon"
                        viewBox="0 0 24 24"
                        fill="none"
                        aria-hidden="true">

                        <path
                            d="M4 4v5h5M20 20v-5h-5M4.5 9a8 8 0 0 1 14.4-3.5M19.5 15a8 8 0 0 1-14.4 3.5"
                            stroke="currentColor"
                            stroke-width="1.8"
                            stroke-linecap="round"
                            stroke-linejoin="round"/>

                    </svg>

                    <span>

                        Reload Player

                    </span>

                </button>
                                <!-- Copy Link -->

                <button
                    id="copyBtn"
                    class="btn btn--secondary"
                    type="button">

                    <svg
                        class="btn__icon"
                        viewBox="0 0 24 24"
                        fill="none"
                        aria-hidden="true">

                        <rect
                            x="9"
                            y="9"
                            width="11"
                            height="11"
                            rx="2"
                            stroke="currentColor"
                            stroke-width="1.8"/>

                        <path
                            d="M5 15H4a1 1 0 0 1-1-1V4a1 1 0 0 1 1-1h10a1 1 0 0 1 1 1v1"
                            stroke="currentColor"
                            stroke-width="1.8"
                            stroke-linecap="round"/>

                    </svg>

                    <span id="copyBtnLabel">

                        Copy Player Link

                    </span>

                </button>

            </div>

            <!-- Screen reader status -->

            <p
                id="statusMessage"
                class="sr-only"
                role="status"
                aria-live="polite">
            </p>

        </section>

    </main>

    <!-- ============================================= -->
    <!-- FOOTER                                        -->
    <!-- ============================================= -->

    <footer class="footer">

        <div class="footer__inner">

            <p>

                &copy; 2026
                <span class="navbar__logo-primary">Home</span><span class="navbar__logo-accent">Flicks</span>

            </p>

        </div>

    </footer>

    <!-- ============================================= -->
    <!-- CONFIGURATION                                 -->
    <!-- ============================================= -->

    <script src="config.js"></script>

    <!-- ============================================= -->
    <!-- APPLICATION                                   -->
    <!-- ============================================= -->

    <script src="script.js"></script>

</body>
</html>
